networks:
  kronk:
    driver: bridge

# Image pins + mem_limits added 2026-06-12 (codebase review): rolling tags
# (`latest`, `main-latest`, `stable`) made upgrades happen by accident on the
# next pull; mem limits keep one runaway container from taking the box down
# (see docs/incidents/INCIDENT_2026-05-31.md). Bump pins deliberately:
# update the tag, `docker compose pull <svc> && docker compose up -d <svc>`.
services:
  nginx:
    image: nginx:1.29-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [kronk]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 128m
    depends_on:
      orchestrator: { condition: service_healthy }
      searxng:      { condition: service_healthy }
      retire_calc:  { condition: service_healthy }
    restart: unless-stopped

  retire_calc:
    build: ../retirement-calc
    # Non-root via compose (its Dockerfile lives in the sibling repo, and
    # this container is condemned at financial-expert phase-3 parity —
    # not worth a cross-repo Dockerfile change).
    user: "1000:1000"
    volumes:
      - ./data/retire:/data
    environment:
      - DATA_DIR=/data
    mem_limit: 512m
    networks: [kronk]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8080/api/inputs\", timeout=3)' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  searxng:
    # Pinned (2026-06-12): SearXNG ships engine/bot-detection fixes weekly;
    # a stale build is a CAPTCHA magnet (the 2026.4.1 build ended up with
    # every engine but aol suspended). Bump the pin ~monthly:
    #   check hub.docker.com/r/searxng/searxng/tags, update, `up -d searxng`.
    image: searxng/searxng:2026.6.12-cc196f2a5
    volumes:
      - ./searxng:/etc/searxng:rw
    mem_limit: 512m
    networks: [kronk]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  tool_service:
    build: ./tool_service
    volumes:
      - ./data:/data
      # MagicMirror SSH key (gitignored; private key lives only here).
      # Generate: ssh-keygen -t ed25519 -f secrets/mm/kronk-mm-update -N '' -C kronk-mm-update
      - ./secrets/mm:/keys:ro
      # MagicMirror ops scripts — bind-mounted (NOT baked into the image) so
      # editing mm-update.sh takes effect with no rebuild/restart, same as
      # litellm/config.yaml. tool_service scp's the current copy to the Pi
      # on each mm operation. See docs/plans/MAGICMIRROR_PLAN.md.
      - ./magicmirror:/magicmirror:ro
      # Ops host registry for the devops agent's remote_exec tool (Phase A,
      # read-only). Bind-mounted so hosts hot-add with no rebuild. hosts.json
      # is gitignored; the mirror also auto-synthesizes from MM_SSH_* env.
      - ./ops:/ops:ro
    environment:
      - SEARXNG_URL=http://searxng:8080
      # Hourly home-forecast cache (served at /weather/cached; the
      # orchestrator injects it into the home agent's prompt).
      - HOME_LOCATION=Laurel, MD
      - WEATHER_REFRESH_SEC=3600
      # HA REST (music playback + mirror announce) — `homeassistant` is on
      # host networking, reached from the bridge via host.docker.internal.
      # (HA_TIMER_ENTITY removed 2026-07-12: timers are native HA Assist now.)
      - HA_URL=http://host.docker.internal:8123
      - HA_TOKEN=${HA_TOKEN}
      # Solar monitoring (SunPower PVS5 via the HAProxy bridge). SOLAR_SERIAL
      # is a credential → in .env. Thresholds tunable; defaults in solar.py.
      # See docs/plans/SOLAR_MONITOR_PLAN.md.
      - SOLAR_HOST=http://sunpower-bridge.home.hippiehouse.net
      - SOLAR_SERIAL=${SOLAR_SERIAL}
      # Music Assistant playback (POST /music → HA music_assistant.play_media).
      # Spoken name → HA entity_id of the *MA* player entity (platform
      # music_assistant, not the native Sonos/Cast entity).
      - MUSIC_PLAYERS=sonos move:media_player.sonos_move_derp_2,kitchen:media_player.home_assistant_voice_0ac919_pe_01
      - MUSIC_DEFAULT_PLAYER=media_player.home_assistant_voice_0ac919_pe_01
      # MagicMirror Pi (POST /magicmirror/update → SSH; the script backs up,
      # updates, restarts pm2, verifies). tool_service stages MM_SCRIPT to
      # the Pi via scp then runs it — no manual file drops, always current.
      # Setup: magicmirror/mm-update.sh header + docs/plans/MAGICMIRROR_PLAN.md.
      - MM_SSH_TARGET=${MM_SSH_TARGET:-pi@mirror.local}
      - MM_SSH_KEY=/keys/kronk-mm-update
      - MM_SCRIPT=/magicmirror/mm-update.sh
      - OPS_HOSTS=/ops/hosts.json
      # Proactive update-completion announcement (HA assist_satellite).
      # Kitchen Voice PE satellite; shared by future timer/proactive alerts.
      - ANNOUNCE_SATELLITE=${ANNOUNCE_SATELLITE:-assist_satellite.home_assistant_voice_0ac919_assist_satellite}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 1g
    networks: [kronk]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8003/health\", timeout=3)' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  litellm:
    # Stays on host networking so it can reach llama.cpp user-systemd servers
    # bound to 127.0.0.1 on the host. Other containers reach it via
    # host.docker.internal:8002.
    # Pinned to a stable release; main-latest tracked the dev branch HEAD and
    # rolled daily — a stealth-upgrade risk for the component every LLM call
    # transits.
    image: ghcr.io/berriai/litellm:v1.88.1
    network_mode: host
    mem_limit: 2g
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
      - ./litellm/hooks.py:/app/hooks.py:ro
    command: ["--config", "/app/config.yaml", "--port", "8002", "--host", "0.0.0.0"]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8002/health/liveliness\", timeout=3)' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  health_service:
    build: ./health_service
    volumes:
      - ./data:/data
    # 2g: embedding model + chromadb live here.
    mem_limit: 2g
    networks: [kronk]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8004/health\", timeout=3)' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  finance_service:
    build: ./finance_service
    volumes:
      # Own subtree, NOT the shared ./data — positions are the most
      # sensitive data on the box; no other service can see them (plan doc
      # + review P3.7). Migration (one time): docker compose stop
      # finance_service && mkdir -p data/finance && mv data/finances.db
      # data/finance/ && docker compose up -d --build finance_service
      - ./data/finance:/data
    environment:
      # LLM used ONLY to propose column mappings for new import formats
      # (never touches numbers; ingestion works without it via manual
      # mapping). LiteLLM is on host networking.
      - LLM_SERVICE_URL=http://host.docker.internal:8002
      - MAPPING_MODEL=gemma-4-e4b
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 1g
    networks: [kronk]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8005/health\", timeout=3)' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  wyoming-piper:
    image: rhasspy/wyoming-piper:2.2.2
    container_name: wyoming-piper
    mem_limit: 1g
    ports:
      - "10200:10200"
    volumes:
      - piper-models:/data
    command: >-
      --voice en_US-lessac-medium
      --uri tcp://0.0.0.0:10200
      --data-dir /data
      --download-dir /data
    networks: [kronk]
    restart: unless-stopped

  orchestrator:
    build: ./orchestrator
    volumes:
      - ./data:/data
      - ./kronk-context.md:/kronk-context.md:ro
      - ./litellm/config.yaml:/litellm-config.yaml:ro
    environment:
      - LLM_SERVICE_URL=http://host.docker.internal:8002
      - TOOL_SERVICE_URL=http://tool_service:8003
      - HEALTH_SERVICE_URL=http://health_service:8004
      - FINANCE_SERVICE_URL=http://finance_service:8005
      - ROUTER_MODEL=gemma-3-4b
      - COORDINATOR_MODEL=gemma-4-e4b
      - HEALTH_AGENT_MODEL=gemma-4-e4b
      - RESEARCH_AGENT_MODEL=gemma-4-e4b
      - FINANCE_AGENT_MODEL=gemma-4-e4b
      - CODING_AGENT_MODEL=devstral-2512-q4
      - DEVOPS_AGENT_MODEL=devstral-2512-q4
      - TALKIE_MODEL=talkie
      - LOCATION=Laurel, MD
      # User-facing error rendering: debug (full detail: causes, HTTP
      # statuses, rid) | friendly (one clean sentence). Rendering only —
      # logs and Langfuse always keep full detail. ERROR_STYLE_VOICE
      # overrides for the shim transport (/api/chat + /v1; HA voice).
      # The voice smoke test (ROADMAP item 8) always runs in debug.
      - ERROR_STYLE=${ERROR_STYLE:-debug}
      # - ERROR_STYLE_VOICE=friendly
      # Per-client session store (SQLite at /data/sessions.db).
      - HISTORY_MAX_MESSAGES=40
      # Langfuse tracing (stack: docker-compose.langfuse.yml; keys in .env).
      # Set LANGFUSE_ENABLED=false to switch all instrumentation to no-ops.
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-true}
      - LANGFUSE_HOST=http://host.docker.internal:3000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      # SYSTEM_PROMPT env removed 2026-06-12: the coordinator persona lives in
      # orchestrator/agents.py (agents.COORDINATOR) since agents-as-tools.
    mem_limit: 1g
    networks: [kronk]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/agents\", timeout=3)' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      tool_service:    { condition: service_healthy }
      searxng:         { condition: service_healthy }
      health_service:  { condition: service_healthy }
      finance_service: { condition: service_healthy }
    restart: unless-stopped

volumes:
  piper-models:
  # ha-config moved to docker-compose.ha.yml (declared external there).
