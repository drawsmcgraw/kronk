# Langfuse (self-hosted) — LLM observability for the Kronk pipeline.
# Separate compose stack (same reasoning as kronk-ha / kronk-ma): its
# lifecycle is independent of orchestrator rebuilds, and it holds state we
# can't afford to lose (Postgres + ClickHouse volumes — do NOT `down -v`).
#
# Plan & rationale: docs/plans/TELEMETRY_PLAN.md
# Secrets: .env.langfuse (gitignored, mode 600). Pass with --env-file.
#
# Services:
#   langfuse-web    — UI + API, http://kronk:3000 (LAN-open; home LAN is the
#                     trust boundary, same as Music Assistant on 8095)
#   langfuse-worker — async ingestion (loopback 3030)
#   clickhouse      — trace/event store (loopback; HTTP on 8124 because HA
#                     owns 8123 on this host)
#   postgres        — metadata (loopback 5432)
#   redis           — queue (loopback 6379)
#   minio           — blob storage for raw events (loopback 9002/9003)
#
# Operations:
#   up:       docker compose -f docker-compose.langfuse.yml --env-file .env.langfuse up -d
#   restart:  docker compose -f docker-compose.langfuse.yml --env-file .env.langfuse restart
#   logs:     docker compose -f docker-compose.langfuse.yml --env-file .env.langfuse logs -f langfuse-web
#   down:     docker compose -f docker-compose.langfuse.yml --env-file .env.langfuse down
#             (NEVER `down -v` — volumes hold all traces + project config)
#   sql:      docker exec -it langfuse-clickhouse clickhouse-client
#               --user clickhouse --password "$CLICKHOUSE_PASSWORD"
#               (traces/observations tables live in the `default` database)
#
# Image tags are PINNED — Langfuse runs schema migrations between versions;
# upgrade deliberately (bump tag, `up -d`, watch web logs for migration).
services:
  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3.181.0
    container_name: langfuse-worker
    restart: unless-stopped
    depends_on: &langfuse-depends-on
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - 127.0.0.1:3030:3030
    # Node heap needs headroom; 1g caused OOM crash-loops on first deploy.
    mem_limit: 1536m
    environment: &langfuse-worker-env
      NEXTAUTH_URL: http://kronk:3000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      SALT: ${SALT}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://127.0.0.1:9002
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_AUTH: ${REDIS_AUTH}
      REDIS_TLS_ENABLED: "false"

  langfuse-web:
    image: docker.io/langfuse/langfuse:3.181.0
    container_name: langfuse-web
    restart: unless-stopped
    depends_on: *langfuse-depends-on
    ports:
      - 3000:3000
    # Node heap needs headroom; 1g caused OOM crash-loops on first deploy.
    mem_limit: 2g
    environment:
      <<: *langfuse-worker-env
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      # Headless bootstrap — creates org/project/user + API keypair on first
      # start so no UI clicking is needed. Values live in .env.langfuse.
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD}

  clickhouse:
    image: docker.io/clickhouse/clickhouse-server:26.3
    container_name: langfuse-clickhouse
    restart: unless-stopped
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    ports:
      # HTTP remapped 8123→8124: Home Assistant owns 8123 on this host (host net).
      - 127.0.0.1:8124:8123
      - 127.0.0.1:9009:9000
    mem_limit: 2g
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s

  minio:
    image: cgr.dev/chainguard/minio
    container_name: langfuse-minio
    restart: unless-stopped
    entrypoint: sh
    # create the 'langfuse' bucket before starting the service
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - 127.0.0.1:9002:9000
      - 127.0.0.1:9003:9001
    mem_limit: 512m
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 1s
      timeout: 5s
      retries: 5
      start_period: 1s

  redis:
    image: docker.io/redis:7
    container_name: langfuse-redis
    restart: unless-stopped
    command: >
      --requirepass ${REDIS_AUTH}
      --maxmemory-policy noeviction
    ports:
      - 127.0.0.1:6379:6379
    mem_limit: 256m
    volumes:
      - langfuse_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  postgres:
    image: docker.io/postgres:17
    container_name: langfuse-postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      TZ: UTC
      PGTZ: UTC
    ports:
      - 127.0.0.1:5432:5432
    mem_limit: 512m
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data

volumes:
  langfuse_postgres_data:
    driver: local
  langfuse_clickhouse_data:
    driver: local
  langfuse_clickhouse_logs:
    driver: local
  langfuse_minio_data:
    driver: local
  langfuse_redis_data:
    driver: local
