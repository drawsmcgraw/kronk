<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kronk — Resources</title>
<link rel="stylesheet" href="/static/kronk.css">
<style>
  header { position: sticky; top: 0; z-index: 10; gap: 12px; }

  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .last-updated { font-size: 11px; color: var(--text3); font-family: monospace; }
  .refresh-btn {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text2); font-size: 12px; padding: 4px 12px; cursor: pointer; transition: all 0.15s;
  }
  .refresh-btn:hover { border-color: var(--blue); color: var(--blue); }

  main {
    max-width: 1000px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  /* ── Memory bar ─────────────────────────────────────────────────────── */
  .mem-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.1rem 1.3rem;
  }
  .mem-bar-track {
    height: 28px; background: var(--bg3); border-radius: 6px;
    overflow: hidden; display: flex; gap: 1px; margin: 0.75rem 0 0.6rem;
  }
  .mem-bar-seg {
    height: 100%; transition: width 0.4s ease; position: relative; min-width: 2px;
  }
  .mem-bar-seg .seg-label {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; font-size: 10px; font-weight: 600;
    color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden;
    padding: 0 4px; pointer-events: none;
  }
  .mem-legend { display: flex; flex-wrap: wrap; gap: 10px 18px; }
  .mem-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .mem-legend-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
  .mem-stats { display: flex; gap: 24px; margin-top: 0.9rem; flex-wrap: wrap; }
  .mem-stat { font-size: 12px; color: var(--text3); }
  .mem-stat strong { color: var(--text2); font-weight: 600; }

  /* ── Server cards ───────────────────────────────────────────────────── */
  .server-grid { display: flex; flex-direction: column; gap: 12px; }

  .server-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.2rem 1.4rem;
  }

  .server-card-top {
    display: flex; align-items: flex-start; gap: 14px;
  }

  .server-color-bar {
    width: 4px; border-radius: 2px; flex-shrink: 0;
    align-self: stretch; min-height: 50px;
  }

  .server-main { flex: 1; min-width: 0; }

  .server-name-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 3px;
  }

  .server-name { font-size: 15px; font-weight: 600; }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    background: var(--text3); transition: background 0.3s;
  }
  .status-dot.ok     { background: var(--green); }
  .status-dot.error  { background: var(--red); }

  .server-meta {
    font-size: 12px; color: var(--text3); display: flex;
    gap: 12px; flex-wrap: wrap; margin-bottom: 8px;
  }

  .badge {
    font-size: 10px; border-radius: 4px; padding: 1px 7px; font-weight: 500;
  }
  .badge-quant {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text3); font-family: 'JetBrains Mono', monospace;
  }

  .server-right {
    display: flex; flex-direction: column; align-items: flex-end;
    gap: 6px; flex-shrink: 0;
  }
  .server-vram { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; font-family: monospace; }
  .server-vram-sub { font-size: 11px; color: var(--text3); }

  .perf-row {
    display: flex; gap: 20px; margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .perf-stat { font-size: 11px; color: var(--text3); }
  .perf-stat strong { color: var(--text2); font-size: 13px; font-family: monospace; }

  /* ── Agent chips ───────────────────────────────────────────────────── */
  .agent-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .agent-chip {
    font-size: 11px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 20px; padding: 2px 10px; color: var(--text2);
    display: flex; align-items: center; gap: 4px;
  }
  .agent-chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <div class="header-dot"></div>
  <h1>Resources</h1>
  <div class="header-right">
    <span class="last-updated" id="last-updated">—</span>
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</header>

<main>

  <!-- Memory overview -->
  <div>
    <div class="section-label">System Memory</div>
    <div class="mem-card">
      <div class="mem-bar-track" id="mem-bar"></div>
      <div class="mem-legend" id="mem-legend"></div>
      <div class="mem-stats" id="mem-stats"></div>
    </div>
  </div>

  <!-- LLM Servers -->
  <div>
    <div class="section-label">LLM Servers</div>
    <div class="server-grid" id="server-grid">
      <div style="color:var(--text3);font-size:13px;padding:1rem">fetching…</div>
    </div>
  </div>

</main>

<script>

// Deterministic palette keyed by server name, so colors are stable across reloads.
const PALETTE = ['#10b981', '#3b82f6', '#8b5cf6', '#f59e0b', '#ec4899', '#06b6d4', '#ef4444'];
function colorFor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return PALETTE[h % PALETTE.length];
}

// ── Formatters ────────────────────────────────────────────────────────────────

function fmtBytes(b, decimals = 1) {
  if (b >= 1e12) return (b / 1e12).toFixed(decimals) + ' TB';
  if (b >= 1e9)  return (b / 1e9).toFixed(decimals) + ' GB';
  if (b >= 1e6)  return (b / 1e6).toFixed(decimals) + ' MB';
  return (b / 1e3).toFixed(0) + ' KB';
}

// ── Memory bar ────────────────────────────────────────────────────────────────

function renderMemBar(sys, servers) {
  const total = sys.mem_total;
  if (!total) return;

  const available = sys.mem_available;
  const modelBytes = servers.reduce((s, sv) => s + (sv.vram_gb || 0) * 1e9, 0);
  const other = Math.max(0, total - available - modelBytes);

  const segs = [
    ...servers.map(sv => ({
      label: sv.name, bytes: (sv.vram_gb || 0) * 1e9, color: colorFor(sv.name),
    })),
    { label: 'System / other', bytes: other,    color: '#2a3044' },
    { label: 'Available',      bytes: available, color: '#1a1f2e' },
  ];

  document.getElementById('mem-bar').innerHTML = segs.map(s => {
    const pct = (s.bytes / total * 100).toFixed(2);
    const showLabel = s.bytes / total > 0.05;
    return `<div class="mem-bar-seg" style="width:${pct}%;background:${s.color}">
      ${showLabel ? `<span class="seg-label">${fmtBytes(s.bytes, 0)}</span>` : ''}
    </div>`;
  }).join('');

  document.getElementById('mem-legend').innerHTML = segs.slice(0, -1).map(s =>
    `<span class="mem-legend-item">
      <span class="mem-legend-dot" style="background:${s.color}"></span>
      ${s.label} — ${fmtBytes(s.bytes)}
    </span>`
  ).join('');

  const used = total - available;
  document.getElementById('mem-stats').innerHTML = `
    <span class="mem-stat">Total <strong>${fmtBytes(total)}</strong></span>
    <span class="mem-stat">Used <strong>${fmtBytes(used)} (${(used/total*100).toFixed(0)}%)</strong></span>
    <span class="mem-stat">Available <strong>${fmtBytes(available)}</strong></span>
    <span class="mem-stat">Models (est.) <strong>${fmtBytes(modelBytes)}</strong></span>
  `;
}

// ── Server cards ──────────────────────────────────────────────────────────────

function renderServers(servers, metrics) {
  const grid = document.getElementById('server-grid');

  if (!servers.length) {
    grid.innerHTML = `<div style="color:var(--text3);font-size:13px;padding:1rem">No servers configured.</div>`;
    return;
  }

  grid.innerHTML = servers.map(sv => {
    const ok = sv.healthy;
    const dotCls = ok === true ? 'ok' : ok === false ? 'error' : '';
    const statusLabel = ok === true ? 'running' : ok === false ? 'unreachable' : 'unknown';
    const color = colorFor(sv.name);

    const mrow = (metrics.by_model || []).find(r => r.model === sv.name);
    const tokS  = mrow?.avg_tok_s   ? mrow.avg_tok_s  + ' tok/s'    : '—';
    const ttft  = mrow?.avg_ttft_ms ? mrow.avg_ttft_ms + ' ms TTFT' : '—';
    const reqs  = mrow?.requests ?? '—';

    const chips = (sv.agents || []).map(a =>
      `<span class="agent-chip">
        <span class="agent-chip-dot" style="background:${color}"></span>${a}
      </span>`
    ).join('') || `<span class="agent-chip" style="opacity:0.5">unassigned</span>`;

    const portStr  = sv.port    ? `:${sv.port}` : '';
    const ctxStr   = sv.ctx_k   ? `ctx ${sv.ctx_k}k` : '';
    const paramStr = sv.params  ? `${sv.params} params` : '';
    const quantStr = sv.quant   || '';
    const vramStr  = sv.vram_gb != null ? `${sv.vram_gb} GB` : '—';

    return `
      <div class="server-card">
        <div class="server-card-top">
          <div class="server-color-bar" style="background:${color}"></div>
          <div class="server-main">
            <div class="server-name-row">
              <span class="status-dot ${dotCls}"></span>
              <span class="server-name">${sv.name}</span>
              ${quantStr ? `<span class="badge badge-quant">${quantStr}</span>` : ''}
            </div>
            <div class="server-meta">
              ${paramStr ? `<span>${paramStr}</span>` : ''}
              ${ctxStr   ? `<span>${ctxStr}</span>`   : ''}
              ${portStr  ? `<span>${portStr}</span>`  : ''}
              <span style="color:${ok === true ? 'var(--green)' : ok === false ? 'var(--red)' : 'var(--text3)'}">${statusLabel}</span>
            </div>
            <div class="agent-chips">${chips}</div>
          </div>
          <div class="server-right">
            <div class="server-vram" style="color:${color}">${vramStr}</div>
            <div class="server-vram-sub">VRAM (est.)</div>
          </div>
        </div>
        <div class="perf-row">
          <div class="perf-stat">Avg TTFT <strong>${ttft}</strong></div>
          <div class="perf-stat">Avg tok/s <strong>${tokS}</strong></div>
          <div class="perf-stat">Requests <strong>${reqs}</strong></div>
        </div>
      </div>`;
  }).join('');
}

// ── Main load ─────────────────────────────────────────────────────────────────

async function loadAll() {
  const [sysResp, metricsResp, serversResp] = await Promise.allSettled([
    fetch('/api/system'),
    fetch('/api/metrics'),
    fetch('/api/servers'),
  ]);

  const sys      = sysResp.status      === 'fulfilled' && sysResp.value.ok      ? await sysResp.value.json()      : {};
  const metrics  = metricsResp.status  === 'fulfilled' && metricsResp.value.ok  ? await metricsResp.value.json()  : {};
  const servers  = serversResp.status  === 'fulfilled' && serversResp.value.ok  ? (await serversResp.value.json()).servers || [] : [];

  if (sys.mem_total) renderMemBar(sys, servers);
  renderServers(servers, metrics);

  document.getElementById('last-updated').textContent =
    'updated ' + new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

loadAll();
setInterval(loadAll, 15000);
</script>
</body>
</html>
