events {}

http {
    # Inside the bridge network, upstreams are resolved by service name.
    # Host-side services (llama.cpp on the host) come via host.docker.internal.
    resolver 127.0.0.11 ipv6=off valid=10s;

    server {
        listen 80;

        # Allow large file uploads (Garmin export zips, etc.)
        client_max_body_size 500m;

        # Sub-service APIs — consistent /api/<service>/ prefix for all browser-facing calls
        location /api/health/ {
            proxy_pass http://health_service:8004/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/finance/ {
            proxy_pass http://finance_service:8005/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Internal service health probes (for services page status dots)
        location /probe/orchestrator { proxy_pass http://orchestrator:8000/api/status; }
        location /probe/llm          { proxy_pass http://host.docker.internal:8002/health/liveliness; }
        location /probe/tools        { proxy_pass http://tool_service:8003/health; }
        location /probe/health       { proxy_pass http://health_service:8004/health; }
        location /probe/finance      { proxy_pass http://finance_service:8005/health; }
        location /probe/searxng      { proxy_pass http://searxng:8080/healthz; }

        # devstral OpenAI-compatible API — for external coding assistants (e.g. Mistral Vibe)
        location /devstral/ {
            proxy_pass http://host.docker.internal:11436/;
            proxy_buffering off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Main chat UI and all orchestrator routes (/, /services, /message, /files, etc.)
        location / {
            proxy_pass http://orchestrator:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Required for SSE streaming — disable buffering so tokens arrive immediately
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            proxy_set_header Connection '';

            # Extended timeouts for large file uploads over slow mobile connections
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;
        }
    }
}
